name: CI

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Show Go version
        run: go version
      - name: Download modules
        run: go mod download
      - name: Run vet
        run: go vet ./...
      - name: Run race tests (critical packages)
        run: go test -race ./bot/telegram/handler ./bot/download ./bot/platform ./bot/worker
      - name: Run tests
        run: go test ./...
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Derive build metadata
        id: build_meta
        run: |
          TAG=$(git tag --points-at HEAD | head -n 1)
          if [ -z "$TAG" ]; then
            VERSION=$(git rev-parse --short=7 HEAD)
          else
            VERSION="$TAG"
          fi
          COMMIT=$(git rev-parse HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Show Go version
        run: go version
      - name: Download modules
        run: go mod download
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist/package
          go build -trimpath -ldflags "-X main.versionName=${{ steps.build_meta.outputs.version }} -X main.commitSHA=${{ steps.build_meta.outputs.commit }} -X main.buildTime=${{ steps.build_meta.outputs.build_time }}" -o "dist/package/musicbot-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" .
          cp README.md config_example.ini dist/package/
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist/package && zip -r "../musicbot-go-${{ matrix.goos }}-${{ matrix.goarch }}.zip" .)
          else
            (cd dist/package && tar -czf "../musicbot-go-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" .)
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: musicbot-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/musicbot-go-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.zip' || '.tar.gz' }}

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (full)
        id: meta_full
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/musicbot-go
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Derive build metadata
        id: docker_build_meta
        run: |
          TAG=$(git tag --points-at HEAD | head -n 1)
          if [ -z "$TAG" ]; then
            VERSION=$(git rev-parse --short=7 HEAD)
          else
            VERSION="$TAG"
          fi
          COMMIT=$(git rev-parse HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image (full)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: full
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_full.outputs.tags }}
          labels: ${{ steps.meta_full.outputs.labels }}
          build-args: |
            VERSION=${{ steps.docker_build_meta.outputs.version }}
            COMMIT_SHA=${{ steps.docker_build_meta.outputs.commit }}
            BUILD_TIME=${{ steps.docker_build_meta.outputs.build_time }}
          cache-from: type=gha,scope=docker-full
          cache-to: type=gha,mode=max,scope=docker-full

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true
      - name: Generate release notes
        id: release_notes
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG_NAME"^ 2>/dev/null || true)
          {
            echo "## Changes"
            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "From $PREV_TAG to $TAG_NAME"
              git log --pretty=format:"- %s (%an)" "$PREV_TAG".."$TAG_NAME"
            else
              git log --pretty=format:"- %s (%an)" "$TAG_NAME"
            fi
          } > release-notes.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist/*
