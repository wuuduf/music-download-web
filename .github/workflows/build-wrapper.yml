name: Build Apple Music Wrapper Image

# 手动触发，从 WorldObservationLog/wrapper 的上游 Release 取预编译二进制，
# 用统一的 Dockerfile 打包成镜像并推送到本仓库的 GHCR
# (ghcr.io/<owner>/musicbot-wrapper)。
#
# 支持 x86_64 和 arm64 双架构。每个架构单独构建后通过 imagetools 合并为
# 多架构 manifest list，一个 tag 拉取时自动匹配宿主架构。
#
# 上游不发布 Docker 镜像（只发 Release zip），docker-compose.yml 里的 wrapper
# 服务需要一个可 pull 的镜像，本工作流就是为此准备的。
#
# 上游 arm64 release 的 Dockerfile 缺少预编译检测逻辑（会尝试 cmake 源码编译），
# 因此本工作流统一使用带预编译检测的 Dockerfile 覆盖之。

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "推送的镜像 tag"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  build-wrapper:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch_suffix: amd64
            runtime_platform: linux/amd64
            target_arch: amd64
            release_tag: wrapper.x86_64.latest
            asset_name: Wrapper.x86_64.latest.zip
          - platform: linux/arm64
            arch_suffix: arm64
            runtime_platform: linux/arm64
            target_arch: aarch64
            release_tag: wrapper.arm64.latest
            asset_name: Wrapper.arm64.latest.zip
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download upstream wrapper release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ matrix.release_tag }}
          ASSET_NAME: ${{ matrix.asset_name }}
        run: |
          set -euo pipefail
          url="https://github.com/WorldObservationLog/wrapper/releases/download/${RELEASE_TAG}/${ASSET_NAME}"
          echo "Downloading $url"
          curl -fsSL -o wrapper.zip "$url"
          mkdir -p wrapper-src
          unzip -q wrapper.zip -d wrapper-src
          echo "--- extracted contents ---"
          ls -la wrapper-src

      - name: Verify and patch build context
        run: |
          set -euo pipefail
          cd wrapper-src
          test -f wrapper      || { echo "ERROR: prebuilt 'wrapper' binary missing" >&2; exit 1; }
          test -d rootfs       || { echo "ERROR: rootfs/ missing" >&2; exit 1; }
          test -f entrypoint.sh|| { echo "ERROR: entrypoint.sh missing" >&2; exit 1; }
          chmod +x wrapper

          # 上游 arm64 release 的 Dockerfile 缺少预编译检测逻辑，
          # 统一覆盖为带检测的版本（复用 x86_64 release 的逻辑）。
          cat > Dockerfile << 'DOCKERFILE'
          ARG BUILD_PLATFORM=linux/amd64
          ARG RUNTIME_PLATFORM=linux/amd64

          FROM --platform=${BUILD_PLATFORM} debian:13.2 AS build
          ARG TARGET_ARCH=amd64
          ARG NDK_VERSION=23

          SHELL ["/bin/bash", "-c"]

          WORKDIR /app

          # Skip SDK download if a prebuilt wrapper binary is provided
          COPY ./*wrapper ./
          RUN if [[ -f ./wrapper ]]; then \
                  touch /use_prebuild; \
              fi

          RUN --mount=type=cache,target=/var/lib/apt,sharing=locked \
              --mount=type=cache,target=/var/cache/apt,sharing=locked \
              if [[ ! -f /use_prebuild ]]; then \
                  apt-get update; \
                  apt-get install -y \
                      build-essential \
                      cmake \
                      unzip \
                      git \
                      lsb-release \
                      gnupg \
                      aria2; \
              fi

          RUN if [[ ! -f /use_prebuild ]]; then \
                bash -c "$(wget -O - https://apt.llvm.org/llvm.sh)"; \
              fi

          RUN if [[ ! -f /use_prebuild ]]; then \
                  aria2c -o android-ndk-r${NDK_VERSION}b-linux.zip https://dl.google.com/android/repository/android-ndk-r${NDK_VERSION}b-linux.zip; \
                  unzip -q -d /app android-ndk-r${NDK_VERSION}b-linux.zip; \
                  rm android-ndk-r${NDK_VERSION}b-linux.zip; \
              fi

          WORKDIR /app
          COPY ./ ./
          RUN if [[ ! -f /use_prebuild ]]; then \
                  mkdir -p build; \
                  cmake -S /app -B /app/build -DTARGET_ARCH=${TARGET_ARCH}; \
                  cmake --build /app/build -j$(nproc); \
              elif [[ -f wrapper ]]; then \
                  chmod +x /app/wrapper; \
              else \
                  echo "ERROR: Neither CMakeLists.txt nor prebuilt /app/wrapper found in build context." >&2 && \
                  ls -la /app >&2 && \
                  exit 1; \
              fi

          FROM --platform=${RUNTIME_PLATFORM} debian:13.2

          WORKDIR /app
          COPY --from=build /app/wrapper /app/wrapper
          COPY --from=build /app/rootfs /app/rootfs
          COPY entrypoint.sh /app/entrypoint.sh
          RUN chmod +x /app/entrypoint.sh

          CMD ["/app/entrypoint.sh"]

          EXPOSE 10020 20020 30020
          DOCKERFILE
          # Strip leading whitespace from heredoc
          sed -i 's/^          //' Dockerfile
          echo "--- patched Dockerfile ---"
          cat Dockerfile

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/musicbot-wrapper
          tags: |
            type=raw,value=${{ github.event.inputs.image_tag }}-${{ matrix.arch_suffix }}

      - name: Build and push wrapper image (${{ matrix.arch_suffix }})
        uses: docker/build-push-action@v6
        with:
          context: ./wrapper-src
          file: ./wrapper-src/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            RUNTIME_PLATFORM=${{ matrix.runtime_platform }}
            TARGET_ARCH=${{ matrix.target_arch }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  merge-manifests:
    runs-on: ubuntu-latest
    needs: build-wrapper
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest list and push
        env:
          TAG: ${{ github.event.inputs.image_tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/musicbot-wrapper
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${IMAGE}:${TAG}" \
            "${IMAGE}:${TAG}-amd64" \
            "${IMAGE}:${TAG}-arm64"

      - name: Inspect manifest
        env:
          TAG: ${{ github.event.inputs.image_tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/musicbot-wrapper
        run: docker buildx imagetools inspect "${IMAGE}:${TAG}"

      - name: Summary
        env:
          TAG: ${{ github.event.inputs.image_tag }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/musicbot-wrapper
        run: |
          {
            echo "### Wrapper 多架构镜像已推送 :rocket:"
            echo ""
            echo '```'
            echo "${IMAGE}:${TAG}"
            echo '```'
            echo ""
            echo "**架构**: linux/amd64, linux/arm64"
            echo ""
            echo "在 docker-compose.yml 中引用此镜像即可（见 wrapper 服务）。"
          } >> "$GITHUB_STEP_SUMMARY"
