# --- usage / help ---
adm_login_usage = """統合アカウントコマンド:
/status - 統計とアカウント状態を表示
/login <platform> help - プラットフォームが対応するログイン方法を表示
/login <platform> qr - QR コードログイン（対応している場合）
/login <platform> cookie <cookie> - Cookie をインポート
/login <platform> sign - チェックイン/VIP 受け取り（対応している場合）
/login sign <platform> - プラットフォームごとにチェックイン/VIP 受け取りを実行
/login <platform> check - プラットフォームのアカウント状態を確認
/login check - すべてのプラットフォームのアカウント状態を確認
/login <platform> renew - 手動更新
/login renew - すべてのプラットフォームを一括更新
/login <platform> auto on|off|status [intervalSec] - 自動更新
/login auto on|off|status [intervalSec] - すべてのプラットフォームの自動更新を一括設定
対応プラットフォーム: {{.Platforms}}"""
adm_login_help = "{{.Platform}} 対応: {{.Methods}}\n\n例:\n{{.Examples}}"
