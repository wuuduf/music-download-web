# --- usage / help ---
adm_login_usage = """Unified account commands:
/status - View stats and account status
/login <platform> help - Show supported login methods for a platform
/login <platform> qr - QR login (if supported)
/login <platform> cookie <cookie> - Import Cookie
/login <platform> sign - Check-in / VIP claim (if supported)
/login sign <platform> - Run check-in / VIP claim for a platform
/login <platform> check - Check platform account status
/login check - Check all platform account statuses
/login <platform> renew - Manual renewal
/login renew - Bulk renew all platforms
/login <platform> auto on|off|status [intervalSec] - Auto renewal
/login auto on|off|status [intervalSec] - Set auto renewal for all platforms
Supported platforms: {{.Platforms}}"""
