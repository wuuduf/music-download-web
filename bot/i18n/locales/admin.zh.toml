# --- usage / help ---
adm_login_usage = """统一账号命令:
/status - 查看统计与账号状态
/login <platform> help - 查看平台支持的登录方式
/login <platform> qr - 扫码登录（如支持）
/login <platform> cookie <cookie> - 导入 Cookie
/login <platform> sign - 签到/VIP 领取（如支持）
/login sign <platform> - 按平台执行签到/VIP 领取
/login <platform> check - 检查平台账号状态
/login check - 检查所有平台账号状态
/login <platform> renew - 手动续期
/login renew - 批量续期所有平台
/login <platform> auto on|off|status [intervalSec] - 自动续期
/login auto on|off|status [intervalSec] - 批量设置所有平台自动续期
支持平台: {{.Platforms}}"""
