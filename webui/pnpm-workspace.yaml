packages:
  - "apps/*"

allowBuilds:
  '@swc/core': true
  esbuild: true

# AMLL Editor upstream explicitly does not require these dependency install
# scripts. Declaring them here keeps pnpm's strict CI policy from treating the
# intentionally skipped scripts as an installation failure.
ignoredBuiltDependencies:
  - '@applemusic-like-lyrics/core'
  - '@applemusic-like-lyrics/vue'
  - '@parcel/watcher'

catalog:
  react: 19.2.3
  react-dom: 19.2.3

minimumReleaseAgeExclude:
  - '@applemusic-like-lyrics/core@0.2.0'
  - '@applemusic-like-lyrics/vue@0.2.0'
  - '@applemusic-like-lyrics/core@0.4.1'
  - '@applemusic-like-lyrics/lyric@1.0.0'
  - '@applemusic-like-lyrics/react@0.4.1'
  - '@applemusic-like-lyrics/core@0.5.2'
  - '@applemusic-like-lyrics/lyric@1.0.2'
  - '@applemusic-like-lyrics/react@0.5.2'

patchedDependencies:
  '@applemusic-like-lyrics/core@0.2.0': apps/editor/patches/@applemusic-like-lyrics__core.patch
  '@types/wicg-file-system-access@2023.10.7': apps/editor/patches/@types__wicg-file-system-access.patch
