<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="white" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#121212" />
    <meta name="darkreader-lock" />
    <meta name="color-scheme" content="dark light" />
    <style>
      html {
        background-color: light-dark(white, #121212);
      }
      #app {
        transition: opacity 0.15s;
      }
      #loading {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        margin: auto;
        height: 4px;
        width: 200px;
        background-color: light-dark(#dedede, #333);
        border-radius: 2px;
        overflow: hidden;
        animation: l-enter 1s linear;
      }
      #loading::before {
        content: '';
        position: absolute;
        background: var(--thumb-color);
        inset-block-start: 0;
        inset-inline-start: 0;
        inset-block-end: 0;
        will-change: inset-inline-start, inset-inline-end;
        animation: l-progressbar-indeterminate-anim 2.1s cubic-bezier(0.65, 0.815, 0.735, 0.395)
          infinite;
        animation-delay: 1.3s;
      }
      #loading::after {
        content: '';
        position: absolute;
        background: var(--thumb-color);
        inset-block-start: 0;
        inset-inline-start: 0;
        inset-block-end: 0;
        will-change: inset-inline-start, inset-inline-end;
        animation: l-progressbar-indeterminate-anim-short 2.1s cubic-bezier(0.165, 0.84, 0.44, 1)
          infinite;
        animation-delay: 2.45s;
      }
      @keyframes l-enter {
        0%,
        85% {
          opacity: 0;
        }
      }
      @keyframes l-progressbar-indeterminate-anim {
        0% {
          inset-inline-start: -35%;
          inset-inline-end: 100%;
        }
        60% {
          inset-inline-start: 100%;
          inset-inline-end: -90%;
        }
        100% {
          inset-inline-start: 100%;
          inset-inline-end: -90%;
        }
      }
      @keyframes l-progressbar-indeterminate-anim-short {
        0% {
          inset-inline-start: -200%;
          inset-inline-end: 100%;
        }
        60% {
          inset-inline-start: 107%;
          inset-inline-end: -8%;
        }
        100% {
          inset-inline-start: 107%;
          inset-inline-end: -8%;
        }
      }
    </style>
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicons/favicon-light.svg"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicons/favicon-dark.svg"
      media="(prefers-color-scheme: dark)"
    />
  </head>
  <body>
    <div id="app" style="opacity: 0"></div>
    <div id="loading"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
